services:
  postgres:
    image: postgres:16-alpine
    container_name: bron_postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bron}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bron_mod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bron} -d ${POSTGRES_DB:-bron_mod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: bron_app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bron}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bron_mod}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "127.0.0.1:3000:3000"   # наружу отдаёт Caddy (см. caddy/Caddyfile)
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local

networks:
  internal:
    driver: bridge
